<!DOCTYPE html>
<html lang="en">

<head>
    <title>DOM Practice</title>
    <style>
        body {
            font-family: sans-serif;
            padding: 20px;
        }

        .box {
            width: 100px;
            height: 100px;
            border: 1px solid black;
            background-color: lightgray;
        }

        .hidden {
            display: none;
        }

        .dark-mode {
            background-color: black;
            color: white;
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        .active {
            background: #4caf50;
            color: white;
        }
    </style>
</head>

<body>

    <h1 id="main-heading">Old Heading</h1>
    <button id="btn-1">Change Heading</button>
    <hr>

    <div id="color-box" class="box"></div>
    <button id="btn-2">Turn Blue</button>
    <hr>

    <input type="text" id="user-input" placeholder="Type something...">
    <button id="btn-3">Log Input</button>
    <hr>

    <a id="my-link" href="https://google.com">Go to Google</a>
    <button id="btn-4">Change Link</button>
    <hr>

    <img id="my-image" src="https://via.placeholder.com/100" alt="Placeholder">
    <button id="btn-5">Hide Image</button>
    <hr>

    <h3>Counter: <span id="counter-value">0</span></h3>
    <button id="inc-btn">+</button>
    <button id="dec-btn">-</button>
    <hr>

    <button id="toggle-mode">Toggle Dark Mode</button>
    <hr>

    <input type="password" id="password-input" placeholder="Enter Password">
    <button id="login-btn">Login</button>
    <p id="error-msg" style="color: red;"></p>
    <hr>

    <ul id="shopping-list">
        <li>Milk</li>
    </ul>
    <input type="text" id="item-input">
    <button id="add-item-btn">Add Item</button>
    <hr>

    <p id="secret-msg">This is a secret message!</p>
    <button id="toggle-msg-btn">Hide Message</button>
    <hr>

    <div id="products">
        <button id="laptop"> Add Laptop(50k) </button>
        <button id="mobile"> Add Mobile(20k) </button>
        <button id="usb"> Add USB(500) </button>
    </div>
    <h3> Cart: </h3>
    <ul id="cart-list">

    </ul>

    <h4> Total Bill: Rs <span id="total-price"> 0 </span> </h4>
    <hr>

    <h2>Tabbed Interface</h2>

    <div class="tabs">
        <button class="tab-btn active" data-target="box1">Tab 1</button>
        <button class="tab-btn" data-target="box2">Tab 2</button>
        <button class="tab-btn" data-target="box3">Tab 3</button>
    </div>


    <div id="box1" class="content-box">
        <h3>Box 1 Content</h3>
        <p>This is the first content box.</p>
    </div>

    <div id="box2" class="content-box hidden">
        <h3>Box 2 Content</h3>
        <p>This is the second content box.</p>
    </div>

    <div id="box3" class="content-box hidden">
        <h3>Box 3 Content</h3>
        <p>This is the third content box.</p>
    </div>
    <hr>

    <h2>Task App</h2>
    
    <input id="taskInput" type="text" placeholder="Enter task">
    <button onclick="addTask()">Add Task</button>

    <br><br>

    <button onclick="showAll()">Show All</button>
    <button onclick="showActive()">Show Active</button>
    <button onclick="showCompleted()">Show Completed</button>

    <h3>Tasks:</h3>
    <ul id="taskList"></ul>
    <hr>
    
    <script src="./script/script.js"></script>
</body>

</html>
